name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write


jobs:
  lint:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy .


  release:
    name: Semantic Release (version + tag)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release (tag only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version


  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tags
        run: |
          echo "current=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "previous=$(git describe --tags --abbrev=0 ${GITHUB_REF_NAME}^ 2>/dev/null || echo '')" >> $GITHUB_OUTPUT


      - name: Generate partial changelog (since last tag)
        run: |
          if [ -z "${{ steps.tags.outputs.previous }}" ]; then
            echo "Initial release" > release_notes.md
            git log --pretty=format:"- %s (%h)" >> release_notes.md
          else
            git log ${{ steps.tags.outputs.previous }}..${{ steps.tags.outputs.current }} \
              --pretty=format:"- %s (%h)" > release_notes.md
          fi


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}