name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy build

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: mypy .

      - name: Build (validation)
        run: python -m build


  release:
    name: Version + Tag
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release (version + tag)
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(semantic-release version --print)
          echo "version=$VERSION" >> $GITHUB_OUTPUT


  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semantic-release
        run: pip install python-semantic-release

      # --- Generate latest release notes only ---
      - name: Generate latest release notes only
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=$(git describe --tags --abbrev=0)

          if [ -z "$LAST_TAG" ]; then
            git log --pretty=format:"- %s (%h)" > release_notes.md
          else
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github_release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1