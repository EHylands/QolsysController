name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy build

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Typecheck
        run: mypy .

      - name: Build (validation only)
        run: python -m build


  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release (tag + changelog + GitHub release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish


  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout repo (for versioned build)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1