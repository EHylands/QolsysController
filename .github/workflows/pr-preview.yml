name: Semantic Release Preview (PR)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Semantic Release Preview
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout full history (required for semantic-release)
      # ------------------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------
      # Python setup
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ------------------------------------------------------------
      # Install semantic-release
      # ------------------------------------------------------------
      - name: Install semantic-release
        run: pip install python-semantic-release

      # ------------------------------------------------------------
      # Force evaluation against main branch (avoids detached HEAD issues)
      # ------------------------------------------------------------
      - name: Prepare main branch context
        run: |
          git fetch origin main:main
          git checkout main

      # ------------------------------------------------------------
      # Get next version
      # ------------------------------------------------------------
      - name: Get next version
        run: |
          echo "## 📦 Semantic Release Preview" > preview.txt
          echo "" >> preview.txt
          echo "### Next Version" >> preview.txt
          semantic-release version --print >> preview.txt
          echo "" >> preview.txt

      # ------------------------------------------------------------
      # Generate changelog preview (no scopes required)
      # ------------------------------------------------------------
      - name: Generate changelog preview
        run: |
          echo "### Changelog Preview" >> preview.txt
          semantic-release changelog >> preview.txt || true
          echo "" >> preview.txt

      # ------------------------------------------------------------
      # Format PR comment
      # ------------------------------------------------------------
      - name: Build PR comment
        run: |
          cat preview.txt > comment.md

      # ------------------------------------------------------------
      # Post PR comment
      # ------------------------------------------------------------
      - name: Post comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: comment.md